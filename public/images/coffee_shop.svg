<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="coffee" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c0854a"/>
      <stop offset="100%" style="stop-color:#8b5e3c"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7f40ff"/>
      <stop offset="100%" style="stop-color:#aa42ff"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg2)"/>
  
  <!-- Laptop Frame -->
  <rect x="100" y="40" width="400" height="240" rx="12" fill="#2a2a4a" stroke="#444" stroke-width="2"/>
  <rect x="115" y="55" width="370" height="200" rx="4" fill="#1a1a2e"/>
  <!-- Laptop base -->
  <path d="M60,285 L540,285 L520,280 L80,280 Z" fill="#3a3a5a"/>
  <ellipse cx="300" cy="282" rx="30" ry="3" fill="#555"/>
  
  <!-- Website Content -->
  <!-- Navbar -->
  <rect x="115" y="55" width="370" height="25" fill="#222244"/>
  <circle cx="130" cy="67" r="5" fill="#ff6b6b"/>
  <circle cx="145" cy="67" r="5" fill="#ffd93d"/>
  <circle cx="160" cy="67" r="5" fill="#6bcf7f"/>
  <rect x="200" y="63" width="40" height="8" rx="4" fill="#444"/>
  <rect x="250" y="63" width="30" height="8" rx="4" fill="#444"/>
  <rect x="290" y="63" width="35" height="8" rx="4" fill="#444"/>
  <rect x="430" y="62" width="45" height="12" rx="6" fill="url(#coffee)"/>
  
  <!-- Hero Section -->
  <rect x="130" y="90" width="150" height="12" rx="6" fill="url(#coffee)" opacity="0.8"/>
  <rect x="130" y="110" width="120" height="8" rx="4" fill="#555"/>
  <rect x="130" y="125" width="80" height="25" rx="12" fill="url(#coffee)"/>
  <text x="170" y="141" fill="white" font-size="9" text-anchor="middle" font-family="Arial">Order Now</text>
  
  <!-- Coffee Cup Icon -->
  <rect x="370" y="95" width="60" height="50" rx="8" fill="url(#coffee)" opacity="0.3"/>
  <ellipse cx="400" cy="120" rx="15" ry="18" fill="url(#coffee)" opacity="0.5"/>
  
  <!-- Product Cards -->
  <rect x="130" y="165" width="75" height="80" rx="8" fill="#2a2a4a"/>
  <circle cx="167" cy="190" r="15" fill="url(#coffee)" opacity="0.4"/>
  <rect x="145" y="215" width="45" height="6" rx="3" fill="#444"/>
  <rect x="150" y="225" width="35" height="12" rx="6" fill="url(#coffee)" opacity="0.6"/>
  
  <rect x="215" y="165" width="75" height="80" rx="8" fill="#2a2a4a"/>
  <circle cx="252" cy="190" r="15" fill="url(#coffee)" opacity="0.4"/>
  <rect x="230" y="215" width="45" height="6" rx="3" fill="#444"/>
  <rect x="235" y="225" width="35" height="12" rx="6" fill="url(#coffee)" opacity="0.6"/>
  
  <rect x="300" y="165" width="75" height="80" rx="8" fill="#2a2a4a"/>
  <circle cx="337" cy="190" r="15" fill="url(#coffee)" opacity="0.4"/>
  <rect x="315" y="215" width="45" height="6" rx="3" fill="#444"/>
  <rect x="320" y="225" width="35" height="12" rx="6" fill="url(#coffee)" opacity="0.6"/>

  <!-- Title -->
  <text x="300" y="330" fill="white" font-size="20" text-anchor="middle" font-family="Arial" font-weight="bold">Coffee Shop Web App</text>
  <text x="300" y="355" fill="#c0854a" font-size="14" text-anchor="middle" font-family="Arial">Next.js · React · Responsive Design</text>
  <text x="300" y="378" fill="#888" font-size="11" text-anchor="middle" font-family="Arial">Group Project · E-Commerce Experience</text>
</svg>
